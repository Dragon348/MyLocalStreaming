version: '3.9'

services:
  # ==================== Database ====================
  postgres:
    image: postgres:16-alpine
    container_name: music-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: music
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      POSTGRES_DB: music_streaming
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - music-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: music-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - music-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Backend ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: music-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://music:${DB_PASSWORD}@postgres:5432/music_streaming
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      MUSIC_DIR: /data/music
      CACHE_DIR: /data/cache
      LOG_LEVEL: INFO
      SERVER_HOST: 0.0.0.0
    volumes:
      - music_data:/data/music:ro
      - cache_data:/data/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - music-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== Reverse Proxy ====================
  caddy:
    image: caddy:2.8-alpine
    container_name: music-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - music-network

# ==================== Networks ====================
networks:
  music-network:
    driver: bridge

# ==================== Volumes ====================
volumes:
  postgres_data:
  redis_data:
  music_data:
  cache_data:
  caddy_data:
  caddy_config:
